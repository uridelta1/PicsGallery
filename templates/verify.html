{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-73px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Card -->
        <div class="glass rounded-2xl p-8 gradient-border glow text-center">

            <h2 class="text-3xl font-bold bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">
                Verify OTP
            </h2>

            <p class="text-slate-400 mt-2 text-sm">
                Enter the OTP sent to your email
            </p>

            <form method="POST" class="mt-6 space-y-5">
                {% csrf_token %}

                <input 
                    type="text" 
                    name="otp" 
                    placeholder="Enter 6-digit OTP"
                    maxlength="6"
                    class="w-full px-4 py-3 rounded-xl text-center text-lg tracking-widest bg-slate-900 text-white placeholder-slate-500 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-violet-500"
                >

                <button type="submit"
                    class="w-full py-3.5 rounded-xl text-white font-semibold text-sm tracking-wide uppercase bg-gradient-to-r from-violet-500 to-indigo-500 hover:opacity-90 transition">
                    Verify OTP
                </button>
            </form>

            {% if error %}
            <p class="text-red-400 text-sm mt-4">{{ error }}</p>
            {% endif %}

        </div>

    </div>
</div>
{% endblock %}
