{% extends "base.html" %}

{% block title %}Sign Up — PicShare{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-73px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Card -->
        <div class="glass rounded-2xl p-8 gradient-border glow">
            <div class="text-center mb-8">
                <h2
                    class="text-3xl font-bold bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">
                    Join PicShare</h2>
                <p class="text-slate-400 mt-2 text-sm">Create your account and start sharing</p>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" name="username" placeholder="Choose a username"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                    <input type="email" name="email" placeholder="you@example.com"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" placeholder="Create a password"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <button type="submit"
                    class="btn-gradient w-full py-3.5 rounded-xl text-white font-semibold text-sm tracking-wide uppercase">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-slate-500 text-sm">Already have an account?
                    <a href="/login/" class="text-violet-400 hover:text-violet-300 font-medium transition-colors">Sign
                        in</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
