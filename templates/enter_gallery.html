{% extends "base.html" %}

{% block title %}Enter Gallery — PicShare{% endblock %}

{% block nav_links %}
<a href="/dashboard/" class="text-slate-400 hover:text-violet-400 transition-colors text-sm font-medium">← Dashboard</a>
{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-73px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md animate-fade-in-up">

        <div class="glass rounded-2xl p-8 gradient-border glow">
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-blue-600/20 flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                </div>
                <h2
                    class="text-3xl font-bold bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">
                    Enter Gallery</h2>
                <p class="text-slate-400 mt-2 text-sm">Paste the gallery slug to open a shared album</p>
            </div>

            {% if error %}
            <div
                class="mb-6 px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Gallery Slug</label>
                    <input type="text" name="slug" placeholder="Paste gallery slug here"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password <span
                            class="text-slate-500 font-normal">(if required)</span></label>
                    <input type="text" name="password" placeholder="Enter gallery password"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <button type="submit"
                    class="btn-gradient w-full py-3.5 rounded-xl text-white font-semibold text-sm tracking-wide uppercase">
                    🔓 Open Gallery
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
